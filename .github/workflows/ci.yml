name: CI - LumiLivre App

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Unit tests
        run: flutter test --coverage

      - name: Build APK (Dev)
        run: flutter build apk --flavor dev --debug