name: CI - LumiLivre App

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Unit tests
        run: flutter test --coverage

      - name: Build APK (Dev)
        run: flutter build apk --flavor dev --debug --dart-define=API_BASE_URL=http://127.0.0.1:8080

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lumilivre-app-dev-debug
          path: build/app/outputs/flutter-apk/app-dev-debug.apk
          if-no-files-found: error
